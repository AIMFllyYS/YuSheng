<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三体宇宙 - 探索星际语录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            overflow: hidden;
            background: #000;
            color: #fff;
        }

        #container {
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }

        #container:active {
            cursor: grabbing;
        }

        .ui-panel {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #00d9ff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        #controls {
            top: 20px;
            left: 20px;
            max-width: 320px;
        }

        #controls h2 {
            color: #00d9ff;
            font-size: 22px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }

        #controls ul {
            list-style: none;
        }

        #controls li {
            margin: 8px 0;
            font-size: 14px;
            line-height: 1.6;
        }

        #controls .highlight {
            color: #00d9ff;
            font-weight: bold;
        }

        #stats {
            top: 20px;
            right: 20px;
            min-width: 200px;
            text-align: center;
        }

        #stats h3 {
            color: #00d9ff;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .stat-item {
            margin: 8px 0;
            font-size: 14px;
            color: #aaa;
        }

        .stat-value {
            color: #00ff88;
            font-weight: bold;
            font-size: 16px;
        }

        #quote-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }

        #quote-modal.show {
            display: flex;
        }

        .quote-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%);
            border: 3px solid #00d9ff;
            border-radius: 20px;
            padding: 40px;
            max-width: 700px;
            width: 90%;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 217, 255, 0.5);
            animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .quote-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .quote-planet {
            font-size: 28px;
            font-weight: bold;
            color: #00d9ff;
            text-shadow: 0 0 15px rgba(0, 217, 255, 0.8);
        }

        .close-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 36px;
            cursor: pointer;
            transition: all 0.3s;
            line-height: 1;
            padding: 0;
            width: 40px;
            height: 40px;
        }

        .close-btn:hover {
            color: #fff;
            transform: rotate(90deg);
        }

        .quote-text-wrapper {
            position: relative;
            padding: 30px 20px;
        }

        .quote-mark {
            position: absolute;
            font-size: 80px;
            color: #00d9ff;
            opacity: 0.15;
            font-family: Georgia, serif;
        }

        .quote-mark.left {
            top: -10px;
            left: -10px;
        }

        .quote-mark.right {
            bottom: -30px;
            right: -10px;
            transform: rotate(180deg);
        }

        .quote-text {
            font-size: 26px;
            line-height: 1.8;
            text-align: center;
            color: #fff;
            font-family: 'KaiTi', serif;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }

        .quote-author {
            text-align: center;
            margin-top: 30px;
            color: #888;
            font-size: 15px;
        }

        .continue-btn {
            display: block;
            margin: 30px auto 0;
            padding: 12px 30px;
            background: linear-gradient(135deg, #00d9ff, #0088cc);
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 217, 255, 0.4);
        }

        .continue-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 217, 255, 0.6);
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 999;
        }

        .loading-text {
            font-size: 24px;
            color: #00d9ff;
            margin-top: 20px;
            animation: pulse 1.5s infinite;
        }

        .spinner {
            border: 4px solid rgba(0, 217, 255, 0.1);
            border-top: 4px solid #00d9ff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #tooltip {
            position: fixed;
            background: rgba(0, 217, 255, 0.9);
            color: #000;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            pointer-events: none;
            display: none;
            z-index: 999;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.5);
        }

        .planet-label {
            position: absolute;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div class="loading-text">加载三体宇宙中...</div>
    </div>

    <div id="container"></div>

    <div id="controls" class="ui-panel">
        <h2>🌌 三体宇宙探索</h2>
        <ul>
            <li>🖱️ <span class="highlight">拖动</span>：旋转视角探索宇宙</li>
            <li>🔍 <span class="highlight">滚轮</span>：缩放视野距离</li>
            <li>💡 <span class="highlight">点击光点</span>：查看经典语录</li>
            <li>🌍 <span style="color: #1e88e5;">蓝色光点</span> - 地球文明</li>
            <li>🔴 <span style="color: #ff6b6b;">紫红光点</span> - 三体文明</li>
        </ul>
    </div>

    <div id="stats" class="ui-panel">
        <h3>📊 探索统计</h3>
        <div class="stat-item">
            已发现语录: <span class="stat-value" id="discovered-count">0</span>/24
        </div>
        <div class="stat-item">
            探索时间: <span class="stat-value" id="explore-time">00:00</span>
        </div>
    </div>

    <div id="quote-modal">
        <div class="quote-content">
            <div class="quote-header">
                <div class="quote-planet" id="quote-planet"></div>
                <button class="close-btn" onclick="closeQuote()">×</button>
            </div>
            <div class="quote-text-wrapper">
                <div class="quote-mark left">"</div>
                <div class="quote-mark right">"</div>
                <div class="quote-text" id="quote-text"></div>
            </div>
            <div class="quote-author">—— 刘慈欣《三体》</div>
            <button class="continue-btn" onclick="closeQuote()">继续探索宇宙 →</button>
        </div>
    </div>

    <div id="tooltip"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 三体经典语录
        const quotes = [
            "给时光以生命，给岁月以文明",
            "你的无畏来源于无知",
            "我们都是阴沟里的虫子，但总还是得有人仰望星空",
            "弱小和无知不是生存的障碍，傲慢才是",
            "碑是那么小，与其说是为了纪念，更像是为了忘却",
            "记忆是一条早已干涸的河流，只在毫无生气的河床中剩下零落的砾石",
            "我爱你，与你有何相干？毁灭你，又与你有何相干？",
            "不要回答！不要回答！不要回答！",
            "三天后，也就是十四日，在凌晨一点钟至五点钟，整个宇宙将为你闪烁",
            "这是人类的落日",
            "这是计划的一部分",
            "生存是文明的第一需要；文明不断增长和扩张，但宇宙中的物质总量保持不变",
            "死亡不是你的敌人，永恒才是",
            "主不在乎",
            "前进！前进，不择手段地前进！",
            "不要返航！这里不是家！",
            "虫子从来没有被真正战胜过",
            "死亡是唯一一座永远亮着的灯塔，不管你向哪里航行，最终都得转向它指引的方向",
            "没有永恒的敌人或同志，只有永恒的责任",
            "能够作为武器的规律很多，最常用的是空间维度和光速",
            "空不是无，空是一种存在，你得用空这种存在填满自己",
            "给岁月以文明，而不是给文明以岁月",
            "通过忠实地映射宇宙来隐藏自我，是融入永恒的唯一途径",
            "在中国，任何超脱飞扬的思想都会砰然坠地——现实的引力实在是太沉重了"
        ];

        // 全局变量
        let scene, camera, renderer;
        let earth, trisolaris;
        let orbs = [];
        let discoveredQuotes = new Set();
        let startTime = Date.now();
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        // 初始化场景
        function init() {
            // 创建场景
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.001);

            // 创建相机
            camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(0, 20, 60);
            camera.lookAt(0, 0, 0);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 1);
            renderer.shadowMap.enabled = true;
            document.getElementById('container').appendChild(renderer.domElement);

            // 创建星空背景
            createStarField();

            // 创建星云效果
            createNebula();

            // 创建地球
            createEarth();

            // 创建三体星球
            createTrisolaris();

            // 创建语录光点
            createQuoteOrbs();

            // 创建光照
            createLights();

            // 添加事件监听
            addEventListeners();

            // 隐藏加载界面
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
            }, 1500);

            // 开始动画
            animate();

            // 更新探索时间
            setInterval(updateExploreTime, 1000);
        }

        // 创建星空
        function createStarField() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.7,
                transparent: true,
                opacity: 0.8
            });

            const starsVertices = [];
            for (let i = 0; i < 5000; i++) {
                const x = (Math.random() - 0.5) * 500;
                const y = (Math.random() - 0.5) * 500;
                const z = (Math.random() - 0.5) * 500;
                starsVertices.push(x, y, z);
            }

            starsGeometry.setAttribute(
                'position',
                new THREE.Float32BufferAttribute(starsVertices, 3)
            );

            const stars = new THREE.Points(starsGeometry, starsMaterial);
            stars.name = 'stars';
            scene.add(stars);
        }

        // 创建星云效果
        function createNebula() {
            const nebulaGeometry = new THREE.BufferGeometry();
            const nebulaMaterial = new THREE.PointsMaterial({
                color: 0x00d9ff,
                size: 2,
                transparent: true,
                opacity: 0.15,
                blending: THREE.AdditiveBlending
            });

            const nebulaVertices = [];
            for (let i = 0; i < 1000; i++) {
                const x = (Math.random() - 0.5) * 300;
                const y = (Math.random() - 0.5) * 300;
                const z = (Math.random() - 0.5) * 300;
                nebulaVertices.push(x, y, z);
            }

            nebulaGeometry.setAttribute(
                'position',
                new THREE.Float32BufferAttribute(nebulaVertices, 3)
            );

            const nebula = new THREE.Points(nebulaGeometry, nebulaMaterial);
            nebula.name = 'nebula';
            scene.add(nebula);
        }

        // 创建地球
        function createEarth() {
            const earthGroup = new THREE.Group();
            
            // 地球球体
            const earthGeometry = new THREE.SphereGeometry(6, 64, 64);
            const earthMaterial = new THREE.MeshPhongMaterial({
                color: 0x1e88e5,
                emissive: 0x0d47a1,
                emissiveIntensity: 0.3,
                shininess: 50,
                transparent: true,
                opacity: 0.95
            });
            earth = new THREE.Mesh(earthGeometry, earthMaterial);
            earth.castShadow = true;
            earthGroup.add(earth);

            // 地球光环
            const ringGeometry = new THREE.RingGeometry(7, 7.5, 64);
            const ringMaterial = new THREE.MeshBasicMaterial({
                color: 0x4fc3f7,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.4
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.rotation.x = Math.PI / 2;
            earthGroup.add(ring);

            // 外层光晕
            const glowGeometry = new THREE.SphereGeometry(7.5, 32, 32);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0x4fc3f7,
                transparent: true,
                opacity: 0.1,
                side: THREE.BackSide
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            earthGroup.add(glow);

            earthGroup.position.set(-30, 0, 0);
            earthGroup.userData = { type: 'planet', name: '🌍 地球文明' };
            scene.add(earthGroup);
        }

        // 创建三体星球
        function createTrisolaris() {
            const trisolarisGroup = new THREE.Group();
            
            // 三体球体
            const trisolarisGeometry = new THREE.SphereGeometry(6, 64, 64);
            const trisolarisMaterial = new THREE.MeshPhongMaterial({
                color: 0xff6b6b,
                emissive: 0xd32f2f,
                emissiveIntensity: 0.3,
                shininess: 50,
                transparent: true,
                opacity: 0.95
            });
            trisolaris = new THREE.Mesh(trisolarisGeometry, trisolarisMaterial);
            trisolaris.castShadow = true;
            trisolarisGroup.add(trisolaris);

            // 三体光环
            const ringGeometry = new THREE.RingGeometry(7, 7.5, 64);
            const ringMaterial = new THREE.MeshBasicMaterial({
                color: 0xff9999,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.4
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.rotation.x = Math.PI / 2;
            trisolarisGroup.add(ring);

            // 外层光晕
            const glowGeometry = new THREE.SphereGeometry(7.5, 32, 32);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0xff9999,
                transparent: true,
                opacity: 0.1,
                side: THREE.BackSide
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            trisolarisGroup.add(glow);

            trisolarisGroup.position.set(30, 0, 0);
            trisolarisGroup.userData = { type: 'planet', name: '🔴 三体文明' };
            scene.add(trisolarisGroup);
        }

        // 创建语录光点
        function createQuoteOrbs() {
            quotes.forEach((quote, index) => {
                const angle = (index / quotes.length) * Math.PI * 2;
                const radius = 12 + Math.random() * 6;
                const isEarth = index % 2 === 0;
                const planetX = isEarth ? -30 : 30;
                
                const x = planetX + Math.cos(angle) * radius;
                const y = (Math.random() - 0.5) * 12;
                const z = Math.sin(angle) * radius;
                
                // 光点
                const orbGeometry = new THREE.SphereGeometry(0.5, 16, 16);
                const orbColor = isEarth ? 0x00ffff : 0xff00ff;
                const orbMaterial = new THREE.MeshBasicMaterial({
                    color: orbColor,
                    transparent: true,
                    opacity: 0.9
                });
                
                const orb = new THREE.Mesh(orbGeometry, orbMaterial);
                orb.position.set(x, y, z);
                
                // 光晕
                const glowGeometry = new THREE.SphereGeometry(0.8, 16, 16);
                const glowMaterial = new THREE.MeshBasicMaterial({
                    color: orbColor,
                    transparent: true,
                    opacity: 0.3
                });
                const glow = new THREE.Mesh(glowGeometry, glowMaterial);
                orb.add(glow);
                
                // 存储数据
                orb.userData = {
                    type: 'orb',
                    quote: quote,
                    originalColor: orbColor,
                    planet: isEarth ? '🌍 地球文明' : '🔴 三体文明',
                    index: index,
                    isEarth: isEarth,
                    angle: angle,
                    radius: radius,
                    baseY: y
                };
                
                scene.add(orb);
                orbs.push(orb);
            });
        }

        // 创建光照
        function createLights() {
            const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
            scene.add(ambientLight);

            const pointLight1 = new THREE.PointLight(0xffffff, 1.5, 150);
            pointLight1.position.set(0, 50, 50);
            pointLight1.castShadow = true;
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0x00d9ff, 1, 100);
            pointLight2.position.set(-50, -30, 30);
            scene.add(pointLight2);

            const pointLight3 = new THREE.PointLight(0xff6b6b, 1, 100);
            pointLight3.position.set(50, -30, 30);
            scene.add(pointLight3);
        }

        // 添加事件监听
        function addEventListeners() {
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            const tooltip = document.getElementById('tooltip');

            // 鼠标移动
            window.addEventListener('mousemove', (event) => {
                if (isDragging) {
                    const deltaX = event.clientX - previousMousePosition.x;
                    const deltaY = event.clientY - previousMousePosition.y;
                    
                    camera.position.x -= deltaX * 0.05;
                    camera.position.y += deltaY * 0.05;
                    camera.lookAt(0, 0, 0);
                    
                    previousMousePosition = {
                        x: event.clientX,
                        y: event.clientY
                    };

                    tooltip.style.display = 'none';
                } else {
                    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

                    raycaster.setFromCamera(mouse, camera);
                    const intersects = raycaster.intersectObjects(orbs);

                    // 重置所有光点
                    orbs.forEach(orb => {
                        orb.material.opacity = 0.9;
                        orb.scale.set(1, 1, 1);
                    });

                    if (intersects.length > 0) {
                        const orb = intersects[0].object;
                        orb.material.opacity = 1;
                        orb.scale.set(1.8, 1.8, 1.8);
                        renderer.domElement.style.cursor = 'pointer';

                        // 显示提示
                        tooltip.style.display = 'block';
                        tooltip.style.left = event.clientX + 15 + 'px';
                        tooltip.style.top = event.clientY + 15 + 'px';
                        tooltip.textContent = '点击查看语录';
                    } else {
                        renderer.domElement.style.cursor = 'grab';
                        tooltip.style.display = 'none';
                    }
                }
            });

            // 鼠标按下
            window.addEventListener('mousedown', (event) => {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(orbs);

                if (intersects.length > 0) {
                    const orb = intersects[0].object;
                    showQuote(orb.userData);
                    
                    // 记录已发现
                    discoveredQuotes.add(orb.userData.index);
                    updateDiscoveredCount();
                    
                    // 闪烁动画
                    let flashes = 0;
                    const flashInterval = setInterval(() => {
                        orb.material.opacity = orb.material.opacity === 1 ? 0.3 : 1;
                        flashes++;
                        if (flashes > 8) {
                            clearInterval(flashInterval);
                            orb.material.opacity = 1;
                        }
                    }, 80);
                } else {
                    isDragging = true;
                    previousMousePosition = {
                        x: event.clientX,
                        y: event.clientY
                    };
                    renderer.domElement.style.cursor = 'grabbing';
                }
            });

            // 鼠标松开
            window.addEventListener('mouseup', () => {
                isDragging = false;
                renderer.domElement.style.cursor = 'grab';
            });

            // 滚轮缩放
            window.addEventListener('wheel', (event) => {
                camera.position.z += event.deltaY * 0.02;
                camera.position.z = Math.max(25, Math.min(100, camera.position.z));
            });

            // 窗口大小调整
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // 显示语录
        function showQuote(data) {
            document.getElementById('quote-planet').textContent = data.planet;
            document.getElementById('quote-text').textContent = data.quote;
            document.getElementById('quote-modal').classList.add('show');
        }

        // 关闭语录
        function closeQuote() {
            document.getElementById('quote-modal').classList.remove('show');
        }

        // 更新发现数量
        function updateDiscoveredCount() {
            document.getElementById('discovered-count').textContent = discoveredQuotes.size;
        }

        // 更新探索时间
        function updateExploreTime() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('explore-time').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        // 动画循环
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            // 星空缓慢旋转
            const stars = scene.getObjectByName('stars');
            if (stars) stars.rotation.y += 0.0001;

            // 星云旋转
            const nebula = scene.getObjectByName('nebula');
            if (nebula) {
                nebula.rotation.y += 0.0002;
                nebula.rotation.x += 0.0001;
            }

            // 星球自转
            if (earth) earth.rotation.y += 0.003;
            if (trisolaris) trisolaris.rotation.y -= 0.004;

            // 光点动画
            orbs.forEach((orb, index) => {
                // 脉动效果
                const pulse = Math.sin(time * 2 + index * 0.5) * 0.3 + 0.7;
                orb.material.opacity = pulse * 0.9;
                
                // 围绕星球旋转
                const data = orb.userData;
                const newAngle = data.angle + time * 0.05;
                const planetX = data.isEarth ? -30 : 30;
                
                orb.position.x = planetX + Math.cos(newAngle) * data.radius;
                orb.position.z = Math.sin(newAngle) * data.radius;
                orb.position.y = data.baseY + Math.sin(time + index) * 0.5;
                
                // 光晕脉动
                if (orb.children[0]) {
                    orb.children[0].scale.set(pulse * 1.2, pulse * 1.2, pulse * 1.2);
                }
            });

            renderer.render(scene, camera);
        }

        // 页面加载完成后初始化
        window.addEventListener('load', init);

        // ESC键关闭模态框
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeQuote();
            }
        });
    </script>
</body>
</html>
